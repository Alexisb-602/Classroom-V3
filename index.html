<!DOCTYPE html>
<html>
<head>
    <title>Classroom V3</title>
    <style>
        body { margin: 0; background: white; overflow: hidden; height: 100vh; }
        input { position: absolute; opacity: 0; width: 100%; height: 100%; border: none; outline: none; cursor: default; }
    </style>
</head>
<body>
    <input type="password" id="pin" autofocus>
    <script>
        document.getElementById('pin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value === '5667') {
                window.location.href = "hub.html";
            }
        });
    </script>
</body>
</html>
