<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Classroom V3</title>
    <style>
        body { margin: 0; background: #0b0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        /* Barra lateral de navegación */
        .sidebar { width: 220px; background: #151921; display: flex; flex-direction: column; border-right: 1px solid #2d333b; }
        .sidebar h2 { font-size: 18px; padding: 20px; color: #58a6ff; margin: 0; text-align: center; border-bottom: 1px solid #2d333b; }
        .tab-btn { padding: 15px 20px; cursor: pointer; border: none; background: none; color: #8b949e; text-align: left; transition: 0.3s; font-size: 14px; }
        .tab-btn:hover { background: #1f242c; color: white; }
        .tab-btn.active { background: #1f242c; color: #58a6ff; border-left: 4px solid #58a6ff; }
        /* Contenido principal */
        .content { flex: 1; display: flex; flex-direction: column; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .tab-content { display: none; width: 100%; height: 100%; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Classroom V3</h2>
    <div class="tab-btn active" onclick="openTab('google')">🔍 Buscador Privado</div>
    <div class="tab-btn" onclick="openTab('poki')">🎮 Poki Games</div>
    <div class="tab-btn" onclick="openTab('crazy')">⚡ Crazy Games</div>
    <div class="tab-btn" onclick="openTab('pro')">💎 Juegos Pro (GTA/FN)</div>
    <div class="tab-btn" onclick="openTab('ia')">🤖 Grok AI / Chat</div>
    <div class="tab-btn" onclick="openTab('video')">📹 Videollamada</div>
    <div class="tab-btn" onclick="openTab('chat')">🌍 Chat Global</div>
</div>

<div class="content">
    <!-- Buscador Privado (Usa DuckDuckGo que no rastrea) -->
    <div id="google" class="tab-content active">
        <iframe src="https://duckduckgo.com"></iframe>
    </div>
    <!-- Poki -->
    <div id="poki" class="tab-content">
        <iframe src="https://poki.com"></iframe>
    </div>
    <!-- CrazyGames -->
    <div id="crazy" class="tab-content">
        <iframe src="https://www.crazygames.com"></iframe>
    </div>
    <!-- Juegos Pro (Nvidia GeForce Now o Cloud Gaming) -->
    <div id="pro" class="tab-content">
        <iframe src="https://play.geforcenow.com"></iframe>
    </div>
    <!-- IA Grok / Otros -->
    <div id="ia" class="tab-content">
        <iframe src="https://duckduckgo.com"></iframe>
    </div>
    <!-- Videollamada (Jitsi es gratis y privado) -->
    <div id="video" class="tab-content">
        <iframe src="https://meet.jit.si" allow="camera; microphone"></iframe>
    </div>
    <!-- Chat Global -->
    <div id="chat" class="tab-content">
        <iframe src="https://www3.cbox.ws"></iframe>
    </div>
</div>

<script>
    function openTab(tabId) {
        let contents = document.querySelectorAll('.tab-content');
        let buttons = document.querySelectorAll('.tab-btn');
        contents.forEach(c => c.classList.remove('active'));
        buttons.forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
